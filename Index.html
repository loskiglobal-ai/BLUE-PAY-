<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePay Africa - Investment Platform</title>
<style>
:root {
  --blue:#0b1ea8; --dark:#081a8c; --green:#2ecc71; --orange:#e67e22;
  --gold:#f1c40f; --purple:#9b59b6; --white:#fff;
}
body {margin:0;font-family:Segoe UI, sans-serif;background:var(--blue);color:white;overflow-x:hidden;padding-bottom:120px;}
.container {padding:20px;max-width:480px;margin:auto;}
.card {background:rgba(0,0,0,0.4);padding:20px;margin:15px 0;border-radius:18px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);}
.hidden {display:none!important;}
button {background:var(--green);color:white;font-size:16px;padding:12px;border:none;border-radius:10px;width:100%;cursor:pointer;font-weight:bold;margin-top:10px;}
button:disabled {background:#555!important;opacity:0.6;cursor:not-allowed;}
.menu-button {flex:1 1 48%; padding:12px;margin:4px;font-size:15px;border-radius:12px;border:none;cursor:pointer;background:var(--dark);color:white;font-weight:bold;}
.menu-button:hover {opacity:0.9;}
input,select {width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none;color:#000;font-weight:bold;box-sizing:border-box;}
.header {display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.1);}
.header div {cursor:pointer;}
.floating-whatsapp {position:fixed;bottom:20px;right:20px;background:#25d366;color:white;padding:12px 16px;border-radius:50px;font-size:22px;text-decoration:none;z-index:5000;}
#withdrawToast {position:fixed;top:-100px;left:50%;transform:translateX(-50%);background:white;color:#333;padding:12px 20px;border-radius:50px;font-size:13px;font-weight:bold;z-index:5000;box-shadow:0 10px 25px rgba(0,0,0,0.3);transition:0.8s;width:80%;max-width:300px;border-left:5px solid var(--green);}
#withdrawToast.show {top:20px;}
</style>
</head>
<body>

<div id="withdrawToast">✅ <span id="toastText">...</span></div>

<div id="loginPage" class="container">
  <h1 style="text-align:center;font-size:45px;margin:0;">BLUE PAY</h1>
  <p style="text-align:center;color:var(--green);font-weight:bold;">[ $10,000 Welcome Bonus Active ]</p>
  <div class="card">
    <input type="text" id="regName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email Address">
    <input type="text" id="regPhone" placeholder="Phone Number">
    <select id="regCountry"></select>
    <button onclick="registerUser()">Claim Bonus & Register</button>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="header">
    <div onclick="toggleMenu()">☰ Menu</div>
    <div id="welcomeMsg"></div>
    <div onclick="logout()">Logout 🚪</div>
  </div>

  <div id="menuButtons" class="container hidden" style="display:flex; flex-wrap:wrap; gap:5px;">
    <button class="menu-button" onclick="showSection('investment')">💰 Investment Plans</button>
    <button class="menu-button" onclick="showSection('deposit')">💳 Deposit</button>
    <button class="menu-button" onclick="showSection('withdraw')">🏦 Withdraw</button>
    <button class="menu-button" onclick="showSection('savings')">💾 Savings</button>
    <button class="menu-button" onclick="showSection('transactions')">📜 Transactions</button>
    <button class="menu-button" onclick="showSection('support')">🛠 Support Center</button>
    <button class="menu-button" onclick="showSection('buyBPC')">🎫 Buy BPC Code</button>
    <button class="menu-button" onclick="showSection('airtime')">📱 Buy Airtime</button>
  </div>

  <div class="container">
    <!-- Sections -->
    <div id="investment" class="card hidden"></div>
    <div id="deposit" class="card hidden"></div>
    <div id="withdraw" class="card hidden"></div>
    <div id="savings" class="card hidden"></div>
    <div id="transactions" class="card hidden"></div>
    <div id="support" class="card hidden"></div>
    <div id="buyBPC" class="card hidden"></div>
    <div id="airtime" class="card hidden"></div>
  </div>
</div>

<a class="floating-whatsapp" href="https://wa.me/447766494570" target="_blank">💬</a>

<script>
const countries = [
  {name:"Nigeria", currency:"₦", banks:["Access Bank","GT Bank","Zenith Bank","UBA"]},
  {name:"South Africa", currency:"R", banks:["FNB","Standard Bank","ABSA","Nedbank"]},
  {name:"Kenya", currency:"KSh", banks:["Equity","KCB","Co-operative","NCBA"]},
  {name:"Egypt", currency:"E£", banks:["CIB","Banque Misr","National Bank"]},
  // ... Add remaining 50 African countries similarly
];

const regCountry = document.getElementById("regCountry");
countries.forEach(c => {
  const opt = document.createElement("option"); opt.value = c.name; opt.text = `${c.name} ${c.flag||''}`; regCountry.add(opt);
});

let user=null;

function registerUser(){
  const name=document.getElementById("regName").value;
  const email=document.getElementById("regEmail").value;
  const phone=document.getElementById("regPhone").value;
  const countryName=document.getElementById("regCountry").value;
  if(!name||!email||!phone||!countryName) return alert("Fill all fields");
  const country=countries.find(c=>c.name===countryName);
  user={name,email,phone,country,balance:10000,savings:0,transactions:[]};
  localStorage.setItem("bluepay_user",JSON.stringify(user));
  startApp();
}

function startApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("welcomeMsg").innerText=`Welcome ${user.name} to BluePay Investment Platform`;
  showNotifications();
}

function logout(){localStorage.removeItem("bluepay_user");location.reload();}

function toggleMenu(){document.getElementById("menuButtons").classList.toggle("hidden");}

function showSection(id){
  ["investment","deposit","withdraw","savings","transactions","support","buyBPC","airtime"].forEach(s=>document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  renderSection(id);
}

function renderSection(id){
  if(id==="investment"){
    const sec=document.getElementById("investment");
    sec.innerHTML=`<h3>💰 Investment Plans</h3>
      <p>Basic: $500 min - 5% daily</p>
      <p>Premium: $100 min - 3% daily</p>
      <p>Gold: $1000 min - 8% daily</p>
      <input type="number" id="investAmount" placeholder="Amount to invest">
      <button onclick="depositInvestment()">📈 Deposit Investment</button>`;
  }
  if(id==="deposit"){
    const sec=document.getElementById("deposit");
    sec.innerHTML=`<h3>💳 Deposit Funds</h3>
      <p>Available Methods: Card, Crypto (Binance/TRC20), Mobile Money</p>
      <p>Mobile Money (Kenya Safaricom): +254724940251</p>
      <button onclick="alert('Deposit Procedure Shown')">Show Instructions</button>`;
  }
  if(id==="withdraw"){
    const sec=document.getElementById("withdraw");
    sec.innerHTML=`<h3>🏦 Withdraw Funds</h3>
      <b>Balance:</b> ${user.country.currency}${user.balance}<br>
      <input type="number" id="withdrawAmount" placeholder="Amount to withdraw">
      <select>${user.country.banks.map(b=>`<option>${b}</option>`).join('')}</select>
      <input type="password" id="bpcKey" placeholder="Enter BPC Code">
      <button onclick="withdrawBonus()">💸 Withdraw</button>`;
  }
  if(id==="savings"){
    const sec=document.getElementById("savings");
    sec.innerHTML=`<h3>💾 Savings</h3>
      <b>Balance:</b> ${user.country.currency}${user.savings}<br>
      <button onclick="depositSavings()">➕ Deposit Savings</button>
      <button onclick="withdrawSavings()">➖ Withdraw Savings</button>`;
  }
  if(id==="transactions"){
    const sec=document.getElementById("transactions");
    sec.innerHTML=`<h3>📜 Transaction History</h3>
      ${user.transactions.length?user.transactions.map(t=>`<p>${t}</p>`).join(''):"No transactions yet"}`;
  }
  if(id==="support"){
    const sec=document.getElementById("support");
    sec.innerHTML=`<h3>🛠 Support Center</h3>
      <p>How it works: Register -> Buy BPC -> Withdraw</p>
      <p>Why choose us: Fully regulated, secure, 10M+ users</p>
      <p>How to buy BPC Code: Click 'Buy BPC', follow payment, upload proof</p>`;
  }
  if(id==="buyBPC"){
    const sec=document.getElementById("buyBPC");
    sec.innerHTML=`<h3>🎫 Buy BPC Code</h3>
      <p>Price: ${user.country.currency} 1050</p>
      <p>Payment Methods: Card | Crypto | Mobile Money</p>
      <button onclick="alert('BPC Purchase Submitted')">✅ Buy BPC</button>`;
  }
  if(id==="airtime"){
    const sec=document.getElementById("airtime");
    sec.innerHTML=`<h3>📱 Buy Airtime</h3>
      <input type="text" placeholder="Phone number">
      <input type="number" placeholder="Amount">
      <button onclick="alert('Airtime Purchase Submitted')">💸 Buy Airtime</button>`;
  }
}

// Sample functions
function depositInvestment(){alert('Investment deposited!');}
function depositSavings(){alert('Savings deposited!');}
function withdrawSavings(){alert('Savings withdrawn!');}
function withdrawBonus(){alert('Withdrawal submitted for verification!');}
function showNotifications(){
  setInterval(()=>{
    const names=["Mpho","Kabelo","Neo","Lerato","Thabo"];
    const n=names[Math.floor(Math.random()*names.length)];
    const amt=(Math.floor(Math.random()*5)+1)*500;
    document.getElementById("toastText").innerText=`${n} just withdrew ${user.country.currency}${amt}`;
    document.getElementById("withdrawToast").classList.add("show");
    setTimeout(()=>document.getElementById("withdrawToast").classList.remove("show"),4000);
  },15000);
}

// Load saved user
const saved=JSON.parse(localStorage.getItem("bluepay_user"));
if(saved){user=saved;startApp();}
</script>
</body>
</html>
