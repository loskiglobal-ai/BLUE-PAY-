<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BluePay - Secure Bonus Wallet</title>
    <style>
        :root { --blue: #0b1ea8; --dark: #081a8c; --green: #2ecc71; --orange: #e67e22; --gold: #f1c40f; }
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--blue); color:white; padding-bottom:100px; }
        .container { padding: 20px; max-width: 480px; margin: auto; }
        .card { background: rgba(0, 0, 0, 0.4); padding: 20px; margin: 15px 0; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }

        /* Auth Branding */
        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-header h1 { font-size: 50px; margin: 0; letter-spacing: 3px; font-weight: 900; }
        .bonus-tag { color: var(--green); font-weight: bold; font-size: 16px; border: 1px dashed var(--green); padding: 8px; border-radius: 5px; display: inline-block; }

        input, select { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; box-sizing: border-box; color: #000; font-weight: 600; font-size: 15px; }
        button { background: var(--green); color: white; font-size: 16px; padding: 14px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 12px; transition: 0.3s; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        button.secondary { background: #333; }
        button.gold { background: var(--gold); color: black; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; border-left: 4px solid var(--gold); line-height: 1.5; }
        .admin-footer { text-align: center; margin-top: 30px; opacity: 0.4; font-size: 11px; }
    </style>
</head>
<body>

<div id="authSection">
    <div class="container">
        <div class="auth-header">
            <h1>BLUE PAY</h1>
            <div class="bonus-tag">[ Create an account and get 200,000 Bonus ]</div>
        </div>

        <div id="registerBox" class="card">
            <h3 style="text-align:center;">Register</h3>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="Email Address">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="registerAndLogin()">Claim Bonus & Register</button>
            <p style="text-align:center; font-size:14px;">Already a member? <span onclick="toggleAuth()" style="color:var(--green); cursor:pointer;">Login</span></p>
        </div>

        <div id="loginBox" class="card hidden">
            <h3 style="text-align:center;">Login</h3>
            <input type="email" id="logEmail" placeholder="Email Address">
            <input type="password" id="logPass" placeholder="Password">
            <button onclick="loginUser()">Login lifetime</button>
            <p style="text-align:center; font-size:14px;">New user? <span onclick="toggleAuth()" style="color:var(--green); cursor:pointer;">Register</span></p>
        </div>

        <div class="admin-footer">ADMIN PANEL ENCRYPTION ACTIVE</div>
    </div>
</div>

<div id="dashboardPage" class="hidden">
    <header>
        <div style="font-size:24px; cursor:pointer;" onclick="alert('Menu Contact: +254103224955')">☰</div>
        <div style="font-weight: 900; letter-spacing: 2px;">BLUE PAY</div>
        <div onclick="location.reload()">🚪</div>
    </header>

    <div class="container">
        <div class="card" style="text-align:center; border: 2px solid var(--green);">
            <small>Available Balance</small>
            <div style="font-size: 38px; font-weight: 900; color: var(--green);">P <span id="userBalance">0</span></div>
        </div>

        <div class="card">
            <button onclick="openAction('Withdraw')">💸 Withdraw Money</button>
            <button onclick="openAction('Airtime')" style="background:var(--orange)">📱 Buy Airtime</button>
            <button onclick="openAction('Deposit')" style="background:#3498db">📥 Deposit Money</button>
            <button onclick="openAction('Buy BPC')" class="gold">🎁 Buy BPC Code</button>
        </div>

        <div class="card">
            <h3>Account Support</h3>
            <button class="secondary" onclick="showInfo('how')">How it works</button>
            <button class="secondary" onclick="showInfo('users')">Number of users</button>
            <button class="secondary" onclick="showInfo('important')">Important Information</button>
            <div id="infoDisplay" class="info-box hidden"></div>
        </div>

        <div id="actionForm" class="card hidden">
            <h3 id="actionHeader">Action</h3>
            
            <div id="withdrawFields" class="hidden">
                <select id="wMethod" onchange="toggleW()">
                    <option value="orange">Orange Money (Botswana)</option>
                    <option value="bank">Bank Account</option>
                </select>
                <input type="text" id="accDetails" placeholder="Phone Number or Acc Number">
            </div>

            <div id="airtimeFields" class="hidden">
                <select><option>Orange</option><option>Mascom</option><option>BTC</option></select>
                <input type="number" placeholder="Recipient Number">
            </div>

            <input type="number" id="mainAmount" placeholder="Amount (P)">
            <input type="password" id="bpcInput" placeholder="Enter Secure BPC Code" oninput="checkBPC()">
            <button id="submitBtn" onclick="executeTransaction()" disabled>Confirm Submission</button>
            <button class="secondary" onclick="closeAction()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // THE SECRET KEY (Hidden from user interface)
    const _GATE = "Loski"; 
    let userData = JSON.parse(localStorage.getItem("bluepay_secure_save"));
    let currentMode = "";

    function toggleAuth() {
        document.getElementById("registerBox").classList.toggle("hidden");
        document.getElementById("loginBox").classList.toggle("hidden");
    }

    function registerAndLogin() {
        const name = document.getElementById("regName").value;
        const email = document.getElementById("regEmail").value;
        const pass = document.getElementById("regPass").value;
        if(!name || !email || !pass) return alert("Please fill all fields!");

        userData = { name, email, pass, balance: 200000 };
        localStorage.setItem("bluepay_secure_save", JSON.stringify(userData));
        alert("Success! P200,000 Bonus credited. Welcome to BluePay.");
        enterDashboard();
    }

    function loginUser() {
        const email = document.getElementById("logEmail").value;
        const pass = document.getElementById("logPass").value;
        const stored = JSON.parse(localStorage.getItem("bluepay_secure_save"));

        if(stored && email === stored.email && pass === stored.pass) {
            userData = stored;
            enterDashboard();
        } else {
            alert("Login failed. Check details or register.");
        }
    }

    function enterDashboard() {
        document.getElementById("authSection").classList.add("hidden");
        document.getElementById("dashboardPage").classList.remove("hidden");
        document.getElementById("userBalance").innerText = userData.balance.toLocaleString();
    }

    function openAction(mode) {
        currentMode = mode;
        document.getElementById("actionForm").classList.remove("hidden");
        document.getElementById("actionHeader").innerText = mode;
        
        document.getElementById("withdrawFields").classList.toggle("hidden", mode !== 'Withdraw');
        document.getElementById("airtimeFields").classList.toggle("hidden", mode !== 'Airtime');
        
        document.getElementById("mainAmount").value = (mode === 'Buy BPC') ? 1050 : "";
        document.getElementById("bpcInput").value = "";
        checkBPC();
        window.scrollTo(0, document.body.scrollHeight);
    }

    // SECURITY CHECK: Button unlocks only with the hidden code
    function checkBPC() {
        const input = document.getElementById("bpcInput").value;
        document.getElementById("submitBtn").disabled = (input !== _GATE);
    }

    function executeTransaction() {
        const amt = parseFloat(document.getElementById("mainAmount").value);
        if(!amt || amt <= 0) return alert("Invalid amount entered.");

        if(currentMode === "Withdraw" || currentMode === "Airtime") {
            if(amt > userData.balance) return alert("INSUFFICIENT BALANCE!");
            userData.balance -= amt;
        } else {
            userData.balance += amt;
        }

        localStorage.setItem("bluepay_secure_save", JSON.stringify(userData));
        document.getElementById("userBalance").innerText = userData.balance.toLocaleString();
        alert("Successfully purchased...");
        closeAction();
    }

    function showInfo(type) {
        const box = document.getElementById("infoDisplay");
        box.classList.remove("hidden");
        if(type==='how') box.innerHTML = "<b>Step 1:</b> Register. <br><b>Step 2:</b> Purchase a BPC code to verify your ID. <br><b>Step 3:</b> Withdraw your bonus and earnings anytime.";
        if(type==='users') box.innerHTML = "<b>Global Community:</b> BluePay currently serves 10,000,000+ users.";
        if(type==='important') box.innerHTML = "<b>BPC Purchase:</b> To get your code, pay 1050 BWP via Orange Money: Dial *145# -> Int. Transfer -> Kenya -> 724940251.";
    }

    function closeAction() { document.getElementById("actionForm").classList.add("hidden"); }
</script>
</body>
</html>
