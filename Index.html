<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePay Official - Africa</title>
<style>
:root {
  --blue:#0b1ea8;--dark:#081a8c;--green:#2ecc71;--orange:#e67e22;
  --gold:#f1c40f;--purple:#9b59b6;--red:#e74c3c;--grey:#bdc3c7;
}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--blue);color:white;overflow-x:hidden;}
.container{max-width:480px;margin:auto;padding:15px;}
.card{background:rgba(0,0,0,0.4);padding:15px;margin:15px 0;border-radius:15px;border:1px solid rgba(255,255,255,0.1);}
button{background:var(--green);border:none;padding:12px;width:100%;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px;color:white;}
button:disabled{background:#555;cursor:not-allowed;opacity:0.6;}
input, select{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none;box-sizing:border-box;color:#000;font-weight:bold;}
.hidden{display:none !important;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.1);}
.floating-whatsapp{position:fixed;bottom:20px;right:20px;z-index:9999;font-size:35px;cursor:pointer;color:#25D366;}
.toast{position:fixed;top:-100px;left:50%;transform:translateX(-50%);background:white;color:#333;padding:12px 20px;border-radius:50px;transition:0.8s;width:80%;max-width:300px;border-left:5px solid var(--green);font-weight:bold;z-index:5000;}
.toast.show{top:20px;}
.footer{text-align:center;font-size:12px;opacity:0.7;padding:10px;border-top:1px solid rgba(255,255,255,0.2);margin-top:20px;}
.menu-btn{cursor:pointer;font-size:22px;}
.modal,.overlay{position:fixed;top:0;left:0;width:100%;height:100%;}
.overlay{background:rgba(0,0,0,0.85);z-index:2999;}
.modal{background:#081a8c;max-width:400px;margin:auto;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:15px;padding:20px;z-index:3000;box-shadow:0 0 50px rgba(0,0,0,0.9);display:flex;flex-direction:column;}
.modal h2{color:var(--gold);margin:0 0 10px 0;}
.modal input,.modal select{margin:5px 0;}
.modal button{margin-top:12px;}
.row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.row button{flex:1;font-size:14px;}
</style>
</head>
<body>

<div id="toast" class="toast">...</div>

<div class="floating-whatsapp" onclick="window.open('https://wa.me/447766494570?text=How%20can%20I%20withdraw%20my%20bonuses%20I%27m%20a%20new%20member?', '_blank')">💬</div>

<div id="loginSec">
    <div class="container">
        <h1 style="text-align:center; font-size:40px;">BLUE PAY</h1>
        <p style="text-align:center; color:var(--green); font-weight:bold;">Register and claim $500 bonus</p>

        <!-- Registration Form -->
        <div class="card" id="registerCard">
            <input type="text" id="regName" placeholder="Full Names">
            <input type="email" id="regEmail" placeholder="Email">
            <select id="regCountry" onchange="updatePhoneCode()"></select>
            <input type="tel" id="regPhone" placeholder="Phone Number">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="registerUser()">Register & Claim Bonus</button>
        </div>

        <!-- Login Form -->
        <div class="card" id="loginCard">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="loginUser()">Login</button>
        </div>

        <!-- Admin Panel -->
        <div class="card" id="adminCard">
            <h3 style="text-align:center;">Admin Panel</h3>
            <input type="text" id="adminPass" placeholder="Enter Admin Password">
            <button onclick="adminLogin()">Enter Admin Panel</button>
        </div>

        <div class="footer">
            <b>BluePay International (PTY) LTD</b><br>
            Licensed & Registered across African Countries<br>
            &copy; 2026 BluePay
        </div>
    </div>
</div>

<div id="dash" class="hidden">
    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰ Menu</div>
        <div>BLUE PAY</div>
        <div onclick="logout()">Logout 🚪</div>
    </header>

    <div class="container">
        <h2>Welcome to BluePay Investment Company</h2>
        <div class="card" style="text-align:center; border:2px solid var(--green);">
            <small>Available Balance</small>
            <div style="font-size:28px; font-weight:900; color:var(--green);"><span id="userBal">0</span> USD</div>
        </div>

        <div class="row card">
            <button onclick="triggerAction('Investment')">💹 Investment</button>
            <button onclick="triggerAction('Withdraw')">💸 Withdraw</button>
            <button onclick="triggerAction('Savings')">💰 Savings</button>
            <button onclick="triggerAction('Deposit')">📥 Deposit</button>
            <button onclick="triggerAction('Transactions')">📜 Transactions</button>
            <button onclick="triggerAction('Activate')">🛡️ Activate Account</button>
        </div>

        <div class="card" id="supportCard">
            <h3>Support Center</h3>
            <button onclick="showSupport('how')">How it Works</button>
            <button onclick="showSupport('why')">Why Choose Us?</button>
            <button onclick="showSupport('users')">Active Users</button>
            <button onclick="raiseIssue()">Raise an Issue</button>
            <div id="supportDisplay" class="hidden" style="margin-top:10px; padding:12px; background:rgba(255,255,255,0.1); border-left:4px solid var(--gold); font-size:14px;"></div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="overlay hidden"></div>
<div id="actionModal" class="modal hidden">
    <h2 id="modalTitle">Action</h2>
    <div id="modalContent"></div>
    <input type="password" id="bpcKey" placeholder="Enter BPC Verification Key" oninput="validateBPC()">
    <button id="finalSubmit" disabled onclick="processFinal()">Confirm</button>
    <button onclick="closeModal()" style="background:#333">Cancel</button>
</div>

<script>
// African countries list (partial, can add all)
const africanCountries=[
{code:"NG",name:"Nigeria",dial:"+234",flag:"🇳🇬"},
{code:"KE",name:"Kenya",dial:"+254",flag:"🇰🇪"},
{code:"ZA",name:"South Africa",dial:"+27",flag:"🇿🇦"},
{code:"GH",name:"Ghana",dial:"+233",flag:"🇬🇭"},
{code:"BW",name:"Botswana",dial:"+267",flag:"🇧🇼"},
// ... add remaining African countries
];
const regCountry=document.getElementById('regCountry');
africanCountries.forEach(c=>{let opt=document.createElement('option');opt.value=c.code;opt.text=`${c.flag} ${c.name} (${c.dial})`;regCountry.appendChild(opt);});
function updatePhoneCode(){const c=africanCountries.find(x=>x.code===regCountry.value);if(c) document.getElementById('regPhone').value=c.dial;}

// Local storage
let user=JSON.parse(localStorage.getItem('bluepay_user'))||null;
let transactions=[];

// Functions
function registerUser(){
    const n=document.getElementById('regName').value;
    const e=document.getElementById('regEmail').value;
    const p=document.getElementById('regPass').value;
    const ph=document.getElementById('regPhone').value;
    const c=document.getElementById('regCountry').value;
    if(!n||!e||!p||!ph){alert('Fill all fields');return;}
    user={name:n,email:e,phone:ph,country:c,balance:500,transactions:[]};
    localStorage.setItem('bluepay_user',JSON.stringify(user));
    startDashboard();
}
function loginUser(){
    const e=document.getElementById('loginEmail').value;
    const p=document.getElementById('loginPass').value;
    if(user&&e===user.email){startDashboard();}
    else{alert('Invalid credentials');}
}
function adminLogin(){
    const p=document.getElementById('adminPass').value;
    if(p==='admin123'){alert('Admin Panel Opened');console.log('Registered Users:',user);}
    else alert('Wrong Password');
}
function startDashboard(){
    document.getElementById('loginSec').classList.add('hidden');
    document.getElementById('dash').classList.remove('hidden');
    document.getElementById('userBal').innerText=user.balance;
}
function logout(){
    document.getElementById('dash').classList.add('hidden');
    document.getElementById('loginSec').classList.remove('hidden');
}
function toggleMenu(){alert('Manager: Jessica Smith, UK, WhatsApp +447766494570\nStarted: 2018');}
function showSupport(type){
    const d=document.getElementById('supportDisplay');
    d.classList.remove('hidden');
    if(type==='how') d.innerHTML="Step1: Register<br>Step2: Deposit<br>Step3: Invest & Withdraw";
    if(type==='why') d.innerHTML="We are fully licensed, secure, over 60M+ active users, providing reliable bonus payouts. Professional team ensures safety & compliance across all African countries.";
    if(type==='users') d.innerHTML="Currently serving 60M+ active users across Africa.";
}
function raiseIssue(){alert('Send your issue to admin via WhatsApp: +447766494570');}

// Toast notifications
setInterval(()=>{
    if(user){
        const names=["Mpho","Kabelo","Neo","Lerato","Thabo"];
        const n=names[Math.floor(Math.random()*names.length)];
        const amt=(Math.floor(Math.random()*5)+1)*100;
        const t=document.getElementById('toast');
        t.innerText=`${n} just withdrew $${amt}`;
        t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),4000);
    }
},5000);

</script>
</body>
</html>
